state_history:
  des: Gets item state history
  par:
    - nam: i
      typ: String
      des: Item OID
      req: true
    - nam: t_start
      typ: f64
      des: "Beginning timestamp (default: last 24 hours)"
      req: false
    - nam: t_end
      typ: f64
      des: "Ending timestamp (default: now)"
      req: false
    - nam: fill
      typ: String
      des: Fill (nS/T/H/D/W e.g. 10T for 10-minute)
      req: false
    - nam: precision
      typ: u32
      des: Round values to digits after commma
      req: false
    - nam: limit
      typ: u32
      des: Limit records to
      req: false
    - nam: prop
      typ: String
      des: "Property: status or value (default: both)"
      req: false
    - nam: xopts
      typ: Map<String, String>
      des: "Extra: vfn=fn for value grouping: mean/sum (d: mean), fill_null=none|zero|nan|previous, rp=TABLE for custom rp_TABLE"
      req: false
    - nam: compact
      typ: bool
      des: Pack data in arrays according to type
      req: false
  ret: State history payload
  exm: |
    [
        {
            "status": 1,
            "t": 1652059860.0424938,
            "value": 15
        },
        {
            "status": 1,
            "t": 1652059865.045223,
            "value": 15
        },
        {
            "status": 1,
            "t": 1652059870.0452943,
            "value": 15
        },
        {
            "status": 1,
            "t": 1652059875.0443518,
            "value": 15
        }
    ]
state_history_combined:
  des: Gets item state history combined (value only)
  par:
    - nam: i
      typ: String/Vec<String>
      des: Item OID/OIDs
      req: true
    - nam: t_start
      typ: f64
      des: "Beginning timestamp (default: last 24 hours)"
      req: false
    - nam: t_end
      typ: f64
      des: "Ending timestamp (default: now)"
      req: false
    - nam: fill
      typ: String
      des: Fill (nS/T/H/D/W e.g. 10T for 10-minute, requires ts_extension)
      req: true
    - nam: precision
      typ: u32
      des: Round values to digits after commma
      req: false
    - nam: xopts
      typ: Map<String, String>
      des: "Extra: vfn=fn for value grouping: mean/sum (d: mean), fill_null=none|zero|nan|previous, rp=TABLE for custom rp_TABLE"
      req: false
  ret: State history combined payload
  exm: |
    {
        "data": {
            "sensor:env/temp": [
                20.0,
                25.0,
                22.0,
                18.0,
            ],
            "sensor:env/hum": [
                40.0,
                45.0,
                35.2,
                34.0,
            ]
        },
        "t": [
            1745859600.0,
            1745863200.0,
            1745866800.0,
            1745870400.0,
        ]
    }
state_log:
  des: Gets item state log
  par:
    - nam: i
      typ: String
      des: "Item OID, supports ending masks (e.g. sensor:group/#)"
      req: true
    - nam: t_start
      typ: f64
      des: "Beginning timestamp (default: last 24 hours)"
      req: false
    - nam: t_end
      typ: f64
      des: "Ending timestamp (default: now)"
      req: false
    - nam: limit
      typ: u32
      des: Limit records to
      req: false
    - nam: xopts
      typ: Map<String, String>
      des: "Extra: offset=N for query offset, rp=TABLE for custom rp_TABLE"
      req: false
  ret: State log payload (includes OIDs, as other svcs may support get-by-mask)
  exm: |
    [
        {
            "oid": "sensor:tests/temp",
            "status": 1,
            "t": 1652060175.0443184,
            "value": 15
        },
        {
            "oid": "sensor:tests/temp",
            "status": 1,
            "t": 1652060180.046056,
            "value": 15
        },
        {
            "oid": "sensor:tests/temp",
            "status": 1,
            "t": 1652060185.0454304,
            "value": 15
        }
    ]
state_push:
  des: "push item states into db, (payload: single item state or list). skips existing states"
  par:
    - nam: oid
      typ: String
      des: "Item OID (alias: i)"
      req: true
    - nam: status
      typ: i16
      des: "Item status (alias: s)"
      req: true
    - nam: value
      typ: Any
      des: "Item value, numeric only (alias: v)"
      req: false
    - nam: t
      typ: f64
      des: "Timestamp, seconds since epoch (required, no default; key must be 't', not 'set_time')"
      req: true
  exm: |
    {"oid": "sensor:tests/temp", "status": 1, "value": 15.0, "t": 1652060175.044}
